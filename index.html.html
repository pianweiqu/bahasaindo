<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeWords ID - 印尼语跟打</title>
    <style>
        :root {
            --bg: #0a0f1c;
            --bg-elev: #111827;
            --card: #111827;
            --card-2: #1a2333;
            --border: #1f2937;
            --text: #e5e7eb;
            --text-2: #9ca3af;
            --text-3: #6b7280;
            --accent: #22c55e;
            --accent-glow: rgba(34, 197, 94, 0.3);
            --error: #ef4444;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            --radius: 24px;
            --radius-sm: 14px;
        }

        body.light {
            --bg: #f5f7fb;
            --bg-elev: #ffffff;
            --card: #ffffff;
            --card-2: #f8fafc;
            --border: #e5e7eb;
            --text: #0f172a;
            --text-2: #64748b;
            --text-3: #94a3b8;
            --accent-glow: rgba(34, 197, 94, 0.2);
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 30;
            backdrop-filter: blur(20px) saturate(180%);
            background: color-mix(in srgb, var(--bg) 85%, transparent);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 20px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .logo {
            width: 36px;
            height: 36px;
            border-radius: 11px;
            background: linear-gradient(135deg, var(--accent), #0ea5e9);
            display: grid;
            place-items: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 6px 20px var(--accent-glow);
            flex-shrink: 0;
        }

        .brand h1 {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .brand h1 span {
            color: var(--text-2);
            font-weight: 400;
            margin-left: 4px;
        }

        .modes {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px;
            background: var(--card-2);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .mode-btn {
            padding: 6px 14px;
            font-size: 13.5px;
            font-weight: 500;
            border: none;
            background: transparent;
            color: var(--text-2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .mode-btn.active {
            background: var(--card);
            color: var(--text);
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .mode-btn:hover:not(.active) {
            color: var(--text);
        }

        /* Main */
        main {
            max-width: 1120px;
            margin: 0 auto;
            padding: 24px 20px 80px;
        }

        .grid-main {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 980px) {
            .grid-main {
                grid-template-columns: 2fr 1fr;
                align-items: start;
            }
            .left-col {
                grid-column: 1;
            }
            .right-col {
                grid-column: 2;
                position: sticky;
                top: 88px;
            }
        }

        /* Cards */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        @media (min-width: 640px) {
            .stats {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .stat {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 14px 16px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-2);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 650;
            letter-spacing: -0.3px;
        }

        .stat-value.accent { color: var(--accent); }
        .stat-value.error { color: var(--error); }

        /* Practice */
        .practice {
            position: relative;
            padding: 32px 22px 28px;
            background: radial-gradient(1000px 300px at 50% -100px, color-mix(in srgb, var(--accent) 8%, transparent), transparent 60%), var(--card);
        }

        @media (min-width: 640px) {
            .practice { padding: 48px 40px 36px; }
        }

        .tip {
            display: flex;
            justify-content: center;
            margin-bottom: 18px;
        }

        .tip-inner {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--card-2);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 12px;
            color: var(--text-2);
        }

        kbd {
            padding: 2px 6px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 11px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }

        .word-display {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: baseline;
            gap: 2px;
            min-height: 88px;
            margin: 8px 0 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            font-size: 2.5rem;
            line-height: 1.1;
            user-select: none;
            cursor: text;
            transition: transform 0.2s;
        }

        @media (min-width: 640px) {
            .word-display { font-size: 3.5rem; min-height: 100px; }
        }
        @media (min-width: 1024px) {
            .word-display { font-size: 4rem; min-height: 110px; }
        }

        .letter {
            display: inline-block;
            padding: 0 1px;
            color: color-mix(in srgb, var(--text) 25%, transparent);
            transition: color 0.15s ease, transform 0.15s ease, text-shadow 0.15s ease;
            position: relative;
        }

        .letter.space {
            width: 0.45em;
        }

        .letter.correct {
            color: var(--accent);
            text-shadow: 0 0 18px var(--accent-glow);
        }

        .letter.active::after {
            content: '';
            position: absolute;
            left: 10%;
            right: 10%;
            bottom: -10px;
            height: 3px;
            background: var(--accent);
            border-radius: 2px;
            opacity: 0.9;
            animation: pulse 1.4s ease-in-out infinite;
        }

        .word-display.error .letter {
            color: var(--error) !important;
            text-shadow: 0 0 12px color-mix(in srgb, var(--error) 40%, transparent);
        }

        .word-display.shake {
            animation: shake 0.35s cubic-bezier(.36,.07,.19,.97);
        }

        .word-display.pop {
            animation: pop 0.28s ease-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.9; transform: scaleX(1); }
            50% { opacity: 0.45; transform: scaleX(0.85); }
        }

        .ipa-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            height: 28px;
            margin-bottom: 8px;
        }

        .ipa {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 14px;
            color: var(--text-2);
        }

        .speak {
            width: 28px;
            height: 28px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--card-2);
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.2s;
        }
        .speak:hover { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, var(--border)); }

        .translation {
            text-align: center;
            font-size: 22px;
            font-weight: 550;
            margin-bottom: 18px;
            min-height: 32px;
            color: var(--text);
            transition: opacity 0.2s;
        }
        @media (min-width: 640px) { .translation { font-size: 26px; } }

        .example {
            max-width: 720px;
            margin: 0 auto;
            background: var(--card-2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px;
        }
        .example-id {
            font-size: 15px;
            color: var(--text);
        }
        .example-zh {
            font-size: 13px;
            color: var(--text-2);
            margin-top: 4px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 22px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 9px 16px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card-2);
            color: var(--text);
            cursor: pointer;
            transition: all 0.18s;
        }
        .btn:hover { transform: translateY(-1px); border-color: color-mix(in srgb, var(--text-3) 40%, var(--border)); }
        .btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #052e13;
            font-weight: 600;
            box-shadow: 0 6px 18px var(--accent-glow);
        }
        .btn.primary:hover { filter: brightness(1.05); }

        .hidden-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 0;
            height: 0;
        }

        /* Mistakes */
        .section {
            padding: 18px;
        }
        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 15px;
        }
        .badge {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            background: color-mix(in srgb, var(--error) 15%, transparent);
            color: var(--error);
            display: grid;
            place-items: center;
            font-size: 12px;
        }
        .link-btn {
            font-size: 12px;
            color: var(--text-2);
            background: none;
            border: none;
            cursor: pointer;
        }
        .link-btn:hover { color: var(--text); }

        .mistakes-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 32px;
        }
        .mistake {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: color-mix(in srgb, var(--error) 10%, var(--card-2));
            border: 1px solid color-mix(in srgb, var(--error) 22%, var(--border));
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .mistake:hover { transform: translateY(-1px); }
        .mistake-id { font-size: 13px; color: var(--error); font-weight: 550; }
        .mistake-zh { font-size: 11px; color: color-mix(in srgb, var(--error) 70%, var(--text-2)); }

        .empty {
            font-size: 13px;
            color: var(--text-3);
            padding: 4px 0;
        }

        /* Article */
        .article {
            padding: 18px;
        }
        .article-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .article-title { font-size: 16px; font-weight: 650; }
        .article-sub { font-size: 12px; color: var(--text-2); margin-bottom: 12px; }

        .sentence {
            width: 100%;
            text-align: left;
            padding: 12px;
            margin-bottom: 10px;
            background: var(--card-2);
            border: 1px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.18s;
        }
        .sentence:hover { border-color: color-mix(in srgb, var(--text-3) 30%, var(--border)); }
        .sentence.active {
            background: color-mix(in srgb, var(--accent) 10%, var(--card-2));
            border-color: color-mix(in srgb, var(--accent) 35%, var(--border));
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
        }
        .sentence.done .idx {
            background: var(--accent);
            color: #052e13;
        }
        .sentence-row { display: flex; gap: 10px; align-items: flex-start; }
        .idx {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--bg);
            border: 1px solid var(--border);
            display: grid;
            place-items: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-2);
            flex-shrink: 0;
            margin-top: 2px;
        }
        .sen-id { font-size: 14px; color: var(--text); line-height: 1.45; }
        .sen-zh { font-size: 12px; color: var(--text-2); margin-top: 3px; }

        .progress {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }
        .progress-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-2);
            margin-bottom: 6px;
        }
        .bar {
            height: 6px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 999px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), #10b981);
            transition: width 0.4s ease;
        }

        /* Settings */
        .settings {
            padding: 18px;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
            margin-top: 4px;
        }
        @media (min-width: 720px) {
            .settings-grid { grid-template-columns: 1fr 1fr; }
        }

        .setting {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .setting-label { font-size: 14px; font-weight: 500; }
        .setting-desc { font-size: 12px; color: var(--text-2); margin-top: -4px; }
        .setting-value {
            font-size: 12px;
            font-family: ui-monospace, monospace;
            color: var(--accent);
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            height: 28px;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            height: 6px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 999px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            margin-top: -7px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 2px 6px var(--accent-glow);
            border: 2px solid var(--card);
        }
        input[type="range"]::-moz-range-track {
            height: 6px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 999px;
        }
        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--accent);
            border-radius: 50%;
            border: 2px solid var(--card);
        }

        /* Switch */
        .switch {
            position: relative;
            width: 44px;
            height: 26px;
            flex-shrink: 0;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            inset: 0;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 999px;
            transition: 0.2s;
        }
        .slider::before {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            left: 2px;
            top: 2px;
            background: var(--text-3);
            border-radius: 50%;
            transition: 0.2s;
        }
        .switch input:checked + .slider {
            background: color-mix(in srgb, var(--accent) 25%, var(--bg));
            border-color: var(--accent);
        }
        .switch input:checked + .slider::before {
            transform: translateX(18px);
            background: var(--accent);
        }

        /* Toast */
        .toast {
            position: fixed;
            left: 50%;
            bottom: 26px;
            transform: translateX(-50%) translateY(20px);
            background: var(--text);
            color: var(--bg);
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s ease;
            z-index: 100;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        body.light .toast {
            background: #0f172a;
            color: white;
        }

        /* Utility */
        .mt-4 { margin-top: 16px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="brand">
                <div class="logo">ID</div>
                <h1>TypeWords ID <span>- 印尼语跟打</span></h1>
            </div>
            <nav class="modes" id="modes">
                <button class="mode-btn active" data-mode="word">跟打</button>
                <button class="mode-btn" data-mode="listen">听写</button>
                <button class="mode-btn" data-mode="quiz">自测</button>
                <button class="mode-btn" data-mode="article">文章</button>
            </nav>
        </div>
    </header>

    <main>
        <div class="grid-main">
            <div class="left-col">
                <!-- Stats -->
                <div class="stats">
                    <div class="stat">
                        <div class="stat-label">正确率</div>
                        <div class="stat-value accent" id="stat-acc">100%</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">连续正确</div>
                        <div class="stat-value" id="stat-streak">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">今日已学</div>
                        <div class="stat-value" id="stat-today">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">错词数</div>
                        <div class="stat-value error" id="stat-errors">0</div>
                    </div>
                </div>

                <!-- Practice -->
                <div class="card practice" id="practiceCard">
                    <div class="tip">
                        <div class="tip-inner">
                            <kbd>Space</kbd>
                            <span>开始打字 · 点击任意处聚焦</span>
                        </div>
                    </div>

                    <div class="word-display" id="wordDisplay"></div>

                    <div class="ipa-row" id="ipaRow">
                        <span class="ipa" id="ipa"></span>
                        <button class="speak" id="speakBtn" title="朗读">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="11 5 6 9 2 15 6 15 11 19 11 5"></polygon>
                                <path d="M15.54 8.46a5 5 0 0 1 0 7.08"></path>
                            </svg>
                        </button>
                    </div>

                    <div class="translation" id="translation"></div>

                    <div class="example">
                        <div class="example-id" id="exId"></div>
                        <div class="example-zh" id="exZh"></div>
                    </div>

                    <div class="controls">
                        <button class="btn" id="prevBtn">上一个</button>
                        <button class="btn" id="repeatBtn">重读</button>
                        <button class="btn primary" id="nextBtn">下一个 ↵</button>
                    </div>

                    <input id="hiddenInput" class="hidden-input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false">
                </div>

                <!-- Mistakes -->
                <div class="card section mt-4">
                    <div class="section-head">
                        <div class="section-title">
                            <span class="badge">!</span>
                            错词本
                        </div>
                        <button class="link-btn" id="clearMistakes">清空</button>
                    </div>
                    <div class="mistakes-list" id="mistakeList">
                        <span class="empty">暂无错词，继续加油！</span>
                    </div>
                </div>
            </div>

            <div class="right-col">
                <!-- Article -->
                <div class="card article">
                    <div class="article-head">
                        <div class="article-title">跟读文章</div>
                    </div>
                    <div class="article-sub">印尼语上 · 中文下</div>
                    <div id="articleList"></div>
                    <div class="progress">
                        <div class="progress-row">
                            <span>文章进度</span>
                            <span id="progressText">0/3</span>
                        </div>
                        <div class="bar"><div class="bar-fill" id="progressBar"></div></div>
                    </div>
                </div>

                <!-- Settings (initially visible) -->
                <div class="card settings mt-4">
                    <div class="section-head" style="margin-bottom: 2px;">
                        <div class="section-title">设置</div>
                    </div>
                    <div class="settings-grid">
                        <div class="setting">
                            <div class="setting-row">
                                <span class="setting-label">遗忘曲线间隔</span>
                                <span class="setting-value" id="forgetVal">3天</span>
                            </div>
                            <input type="range" id="forgetCurve" min="1" max="7" value="3">
                        </div>

                        <div class="setting">
                            <div class="setting-row">
                                <span class="setting-label">字体大小</span>
                                <span class="setting-value" id="fontVal">100%</span>
                            </div>
                            <input type="range" id="fontSize" min="80" max="150" value="100" step="5">
                        </div>

                        <div class="setting">
                            <div class="setting-row">
                                <div>
                                    <div class="setting-label">键盘音效</div>
                                    <div class="setting-desc">按键时轻微咔嗒声</div>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" data-key="keyboardSound" checked>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>

                        <div class="setting">
                            <div class="setting-row">
                                <div>
                                    <div class="setting-label">自动发音</div>
                                    <div class="setting-desc">切换单词时朗读</div>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" data-key="autoPronounce" checked>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>

                        <div class="setting">
                            <div class="setting-row">
                                <div>
                                    <div class="setting-label">深色模式</div>
                                    <div class="setting-desc">护眼暗色主题</div>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" data-key="darkMode" checked>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>

                        <div class="setting">
                            <div class="setting-row">
                                <div>
                                    <div class="setting-label">数据同步</div>
                                    <div class="setting-desc">云端备份学习记录</div>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" data-key="dataSync">
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>

                        <div class="setting">
                            <div class="setting-row">
                                <div>
                                    <div class="setting-label">显示音标</div>
                                    <div class="setting-desc">IPA 发音标注</div>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" data-key="showIPA" checked>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>

                        <div class="setting">
                            <div class="setting-row">
                                <div>
                                    <div class="setting-label">显示翻译</div>
                                    <div class="setting-desc">中文释义</div>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" data-key="showTranslation" checked>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>

                        <div class="setting">
                            <div class="setting-row">
                                <div>
                                    <div class="setting-label">自动下一个</div>
                                    <div class="setting-desc">完成后自动前进</div>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" data-key="autoNext" checked>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

<script>
(() => {
    // Data
    const vocab = [
        {id:'selamat pagi', zh:'早上好', ipa:'/səˈlamat ˈpaɡi/', exId:'Selamat pagi, apa kabar?', exZh:'早上好，你好吗？'},
        {id:'terima kasih', zh:'谢谢', ipa:'/təˈrima ˈkasih/', exId:'Terima kasih atas bantuanmu.', exZh:'谢谢你的帮助。'},
        {id:'maaf', zh:'对不起', ipa:'/maˈaf/', exId:'Maaf, saya terlambat.', exZh:'对不起，我迟到了。'},
        {id:'apa kabar', zh:'你好吗', ipa:'/ˈapa ˈkabar/', exId:'Hai, apa kabar hari ini?', exZh:'嗨，今天怎么样？'},
        {id:'saya', zh:'我', ipa:'/ˈsaja/', exId:'Saya belajar bahasa Indonesia.', exZh:'我在学习印尼语。'},
        {id:'kamu', zh:'你', ipa:'/ˈkamu/', exId:'Kamu tinggal di mana?', exZh:'你住在哪里？'},
        {id:'makan', zh:'吃', ipa:'/ˈmakan/', exId:'Saya makan nasi goreng.', exZh:'我吃炒饭。'},
        {id:'minum', zh:'喝', ipa:'/ˈminum/', exId:'Saya ingin minum air.', exZh:'我想喝水。'},
        {id:'rumah', zh:'房子', ipa:'/ˈrumah/', exId:'Rumah saya besar.', exZh:'我的房子很大。'},
        {id:'sekolah', zh:'学校', ipa:'/səˈkolah/', exId:'Anak-anak pergi ke sekolah.', exZh:'孩子们去学校。'},
        {id:'buku', zh:'书', ipa:'/ˈbuku/', exId:'Ini buku baru.', exZh:'这是新书。'},
        {id:'air', zh:'水', ipa:'/ˈa.ir/', exId:'Air ini dingin.', exZh:'这水很凉。'},
        {id:'selamat malam', zh:'晚安', ipa:'/səˈlamat ˈmalam/', exId:'Selamat malam, sampai jumpa.', exZh:'晚安，再见。'},
        {id:'sampai jumpa', zh:'再见', ipa:'/ˈsampai ˈdʒumpa/', exId:'Sampai jumpa besok!', exZh:'明天见！'},
        {id:'ya', zh:'是', ipa:'/ja/', exId:'Ya, saya mengerti.', exZh:'是的，我明白。'},
        {id:'tidak', zh:'不', ipa:'/ˈtidak/', exId:'Tidak, terima kasih.', exZh:'不，谢谢。'},
        {id:'besar', zh:'大', ipa:'/bəˈsar/', exId:'Kota Jakarta sangat besar.', exZh:'雅加达市非常大。'},
        {id:'kecil', zh:'小', ipa:'/kəˈtʃil/', exId:'Adik saya masih kecil.', exZh:'我的弟弟妹妹还很小。'},
        {id:'panas', zh:'热', ipa:'/ˈpanas/', exId:'Cuaca hari ini panas.', exZh:'今天天气很热。'},
        {id:'dingin', zh:'冷', ipa:'/ˈdiŋin/', exId:'Minuman ini dingin.', exZh:'这饮料很冰。'},
    ];

    const articles = [
        {id:'Jakarta adalah ibu kota Indonesia.', zh:'雅加达是印度尼西亚的首都。', ipa:'/dʒaˈkarta aˈdalah/'},
        {id:'Kota ini terkenal dengan kemacetan dan kulinernya yang lezat.', zh:'这座城市以交通拥堵和美味佳肴而闻名。', ipa:'/ˈkota ˈini tərˈkənal/'},
        {id:'Banyak orang datang ke Monas untuk melihat pemandangan kota.', zh:'很多人去国家纪念碑看城市风景。', ipa:'/ˈbaɲak ˈoraŋ ˈdataŋ/'},
    ];

    // State
    const state = {
        mode: 'word',
        index: 0,
        articleIndex: 0,
        pos: 0,
        totalKeys: 0,
        correctKeys: 0,
        streak: 0,
        today: new Set(),
        mistakes: new Map(),
        doneArticles: new Set(),
    };

    const settings = Object.assign({
        forgetCurve: 3,
        fontSize: 100,
        keyboardSound: true,
        autoPronounce: true,
        darkMode: true,
        dataSync: false,
        showIPA: true,
        showTranslation: true,
        autoNext: true,
    }, JSON.parse(localStorage.getItem('twid') || '{}'));

    // Elements
    const $ = s => document.querySelector(s);
    const els = {
        word: $('#wordDisplay'),
        ipa: $('#ipa'),
        ipaRow: $('#ipaRow'),
        trans: $('#translation'),
        exId: $('#exId'),
        exZh: $('#exZh'),
        speak: $('#speakBtn'),
        hidden: $('#hiddenInput'),
        card: $('#practiceCard'),
        acc: $('#stat-acc'),
        streak: $('#stat-streak'),
        today: $('#stat-today'),
        errors: $('#stat-errors'),
        mistakes: $('#mistakeList'),
        articleList: $('#articleList'),
        progText: $('#progressText'),
        progBar: $('#progressBar'),
        toast: $('#toast'),
    };

    // Audio
    let audioCtx;
    function clickSound(ok = true) {
        if (!settings.keyboardSound) return;
        try {
            audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.type = 'triangle';
            o.frequency.value = ok ? 880 : 220;
            g.gain.setValueAtTime(ok ? 0.025 : 0.04, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + (ok ? 0.03 : 0.1));
            o.start();
            o.stop(audioCtx.currentTime + (ok ? 0.035 : 0.12));
        } catch {}
    }

    function speak(text) {
        if (!('speechSynthesis' in window)) return;
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'id-ID';
        u.rate = 0.92;
        const vs = speechSynthesis.getVoices();
        const v = vs.find(x => x.lang.toLowerCase().startsWith('id'));
        if (v) u.voice = v;
        speechSynthesis.speak(u);
    }

    function toast(msg) {
        els.toast.textContent = msg;
        els.toast.classList.add('show');
        setTimeout(() => els.toast.classList.remove('show'), 1600);
    }

    function current() {
        return state.mode === 'article' ? articles[state.articleIndex] : vocab[state.index];
    }

    function renderWord() {
        const item = current();
        els.word.innerHTML = '';
        els.word.classList.remove('shake', 'error', 'pop');
        state.pos = 0;

        [...item.id].forEach((ch, i) => {
            const span = document.createElement('span');
            span.className = 'letter' + (ch === ' ' ? ' space' : '');
            span.textContent = ch === ' ' ? '\u00a0' : ch;
            if (i === 0) span.classList.add('active');
            if (state.mode === 'listen') span.style.opacity = '0';
            els.word.appendChild(span);
        });

        els.ipa.textContent = item.ipa || '';
        els.ipaRow.style.display = settings.showIPA ? 'flex' : 'none';

        els.trans.textContent = item.zh;
        els.trans.style.display = settings.showTranslation && state.mode !== 'quiz' ? 'block' : 'none';
        els.trans.style.opacity = state.mode === 'quiz' ? '0.18' : '1';

        if (state.mode === 'article') {
            els.exId.textContent = '';
            els.exZh.textContent = '';
        } else {
            els.exId.textContent = item.exId || '';
            els.exZh.textContent = item.exZh || '';
        }

        applyFontSize();

        if (settings.autoPronounce && state.mode !== 'listen') {
            setTimeout(() => speak(item.id), 120);
        }

        renderArticles();
        focusInput();
    }

    function applyFontSize() {
        const base = window.innerWidth < 640 ? 40 : window.innerWidth < 1024 ? 56 : 64;
        els.word.style.fontSize = (base * settings.fontSize / 100) + 'px';
    }

    function handleChar(ch) {
        const item = current();
        const target = item.id;
        if (state.pos >= target.length) return;

        const expected = target[state.pos];
        const ok = expected === ' ' ? ch === ' ' : ch.toLowerCase() === expected.toLowerCase();

        state.totalKeys++;

        const spans = [...els.word.children];

        if (ok) {
            clickSound(true);
            state.correctKeys++;
            const s = spans[state.pos];
            s.classList.remove('active');
            s.classList.add('correct');
            if (state.mode === 'listen') s.style.opacity = '1';
            s.style.transform = 'translateY(-1px)';
            setTimeout(() => s.style.transform = '', 120);

            state.pos++;
            if (state.pos < spans.length) spans[state.pos].classList.add('active');

            if (state.pos === target.length) {
                els.word.classList.add('pop');
                setTimeout(() => els.word.classList.remove('pop'), 280);
                state.streak++;
                state.today.add((state.mode === 'article' ? 'a' : 'w') + (state.mode === 'article' ? state.articleIndex : state.index));
                if (state.mode === 'article') state.doneArticles.add(state.articleIndex);
                if (state.mode === 'quiz') els.trans.style.opacity = '1';
                updateStats();
                if (settings.autoNext) setTimeout(next, 620);
                else toast('完成！按 Enter 下一个');
            }
        } else {
            clickSound(false);
            state.streak = 0;
            els.word.classList.add('shake', 'error');
            spans.forEach(sp => {
                sp.classList.remove('correct', 'active');
                if (state.mode === 'listen') sp.style.opacity = '0';
            });
            setTimeout(() => {
                els.word.classList.remove('shake', 'error');
                spans.forEach((sp, i) => { if (i === 0) sp.classList.add('active'); });
            }, 320);
            state.pos = 0;

            if (!state.mistakes.has(item.id)) {
                state.mistakes.set(item.id, item);
                renderMistakes();
            }
            if (settings.autoPronounce) setTimeout(() => speak(item.id), 280);
        }
        updateStats();
    }

    function next() {
        if (state.mode === 'article') {
            state.articleIndex = (state.articleIndex + 1) % articles.length;
        } else {
            state.index = (state.index + 1) % vocab.length;
        }
        renderWord();
    }

    function prev() {
        if (state.mode === 'article') {
            state.articleIndex = (state.articleIndex - 1 + articles.length) % articles.length;
        } else {
            state.index = (state.index - 1 + vocab.length) % vocab.length;
        }
        renderWord();
    }

    function updateStats() {
        const acc = state.totalKeys ? Math.round(state.correctKeys / state.totalKeys * 100) : 100;
        els.acc.textContent = acc + '%';
        els.streak.textContent = state.streak;
        els.today.textContent = state.today.size;
        els.errors.textContent = state.mistakes.size;
    }

    function renderMistakes() {
        els.mistakes.innerHTML = '';
        if (state.mistakes.size === 0) {
            els.mistakes.innerHTML = '<span class="empty">暂无错词，继续加油！</span>';
            return;
        }
        state.mistakes.forEach(v => {
            const d = document.createElement('button');
            d.className = 'mistake';
            d.innerHTML = `<span class="mistake-id">${v.id}</span><span class="mistake-zh">${v.zh}</span>`;
            d.onclick = () => {
                const i = vocab.findIndex(x => x.id === v.id);
                if (i >= 0) {
                    setMode('word');
                    state.index = i;
                    renderWord();
                    toast('已定位到错词');
                }
            };
            els.mistakes.appendChild(d);
        });
    }

    function renderArticles() {
        els.articleList.innerHTML = '';
        articles.forEach((a, i) => {
            const btn = document.createElement('button');
            btn.className = 'sentence' + (i === state.articleIndex && state.mode === 'article' ? ' active' : '') + (state.doneArticles.has(i) ? ' done' : '');
            btn.innerHTML = `
                <div class="sentence-row">
                    <div class="idx">${state.doneArticles.has(i) ? '✓' : i + 1}</div>
                    <div>
                        <div class="sen-id">${a.id}</div>
                        <div class="sen-zh">${a.zh}</div>
                    </div>
                </div>`;
            btn.onclick = () => { setMode('article'); state.articleIndex = i; renderWord(); };
            els.articleList.appendChild(btn);
        });
        els.progText.textContent = `${state.doneArticles.size}/${articles.length}`;
        els.progBar.style.width = (state.doneArticles.size / articles.length * 100) + '%';
    }

    function setMode(m) {
        state.mode = m;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
        if (m === 'article') toast('文章跟打模式');
        else if (m === 'listen') toast('听写模式：请听音输入');
        else if (m === 'quiz') toast('自测模式：隐藏翻译');
        else toast('跟打模式');
    }

    function focusInput() {
        els.hidden.focus({preventScroll: true});
    }

    // Events
    document.addEventListener('keydown', e => {
        if (e.code === 'Space') { e.preventDefault(); focusInput(); }
        if (e.key === 'Tab') e.preventDefault();
        if (e.key === 'Enter') { if (state.pos === current().id.length) next(); return; }
        if (e.key === 'ArrowRight') return next();
        if (e.key === 'ArrowLeft') return prev();
        if (e.key.length === 1 || e.key === ' ') handleChar(e.key);
    });

    els.hidden.addEventListener('input', e => {
        const v = e.target.value;
        if (!v) return;
        handleChar(v.slice(-1));
        e.target.value = '';
    });

    els.card.addEventListener('click', focusInput);
    $('#speakBtn').onclick = () => speak(current().id);
    $('#repeatBtn').onclick = () => speak(current().id);
    $('#nextBtn').onclick = next;
    $('#prevBtn').onclick = prev;
    $('#clearMistakes').onclick = () => { state.mistakes.clear(); renderMistakes(); updateStats(); toast('已清空'); };

    document.querySelectorAll('.mode-btn').forEach(b => b.onclick = () => { setMode(b.dataset.mode); renderWord(); });

    // Settings
    function save() { localStorage.setItem('twid', JSON.stringify(settings)); }
    function applySettings() {
        document.body.classList.toggle('light', !settings.darkMode);
        $('#forgetCurve').value = settings.forgetCurve;
        $('#fontSize').value = settings.fontSize;
        $('#forgetVal').textContent = settings.forgetCurve + '天';
        $('#fontVal').textContent = settings.fontSize + '%';
        document.querySelectorAll('[data-key]').forEach(i => i.checked = !!settings[i.dataset.key]);
        els.ipaRow.style.display = settings.showIPA ? 'flex' : 'none';
        els.trans.style.display = settings.showTranslation && state.mode !== 'quiz' ? 'block' : 'none';
        applyFontSize();
    }

    $('#forgetCurve').oninput = e => { settings.forgetCurve = +e.target.value; $('#forgetVal').textContent = e.target.value + '天'; save(); };
    $('#fontSize').oninput = e => { settings.fontSize = +e.target.value; $('#fontVal').textContent = e.target.value + '%'; applyFontSize(); save(); };
    document.querySelectorAll('[data-key]').forEach(i => {
        i.onchange = () => { settings[i.dataset.key] = i.checked; save(); applySettings(); if (i.dataset.key === 'darkMode') toast(settings.darkMode ? '深色模式' : '浅色模式'); };
    });

    // Init
    applySettings();
    renderWord();
    renderMistakes();
    updateStats();
    setTimeout(focusInput, 300);
    window.addEventListener('resize', applyFontSize);

    // Preload voices
    if ('speechSynthesis' in window) speechSynthesis.getVoices();
})();
</script>
