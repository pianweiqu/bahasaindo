    <!-- 数据总览 -->
    <div class="space-y-3">
      <h4 class="text-sm font-semibold text-white/50 tracking-wider">数据总览</h4>
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div class="rounded-xl border border-white/5 bg-[#0f1524] p-5 text-center"><div class="text-3xl font-semibold text-cyan-400">0</div><div class="text-xs text-white/40 mt-1">今日时长(分)</div></div>
        <div class="rounded-xl border border-white/5 bg-[#0f1524] p-5 text-center"><div class="text-3xl font-semibold text-violet-400">1</div><div class="text-xs text-white/40 mt-1">连续打卡(天)</div></div>
        <div class="rounded-xl border border-white/5 bg-[#0f1524] p-5 text-center"><div class="text-3xl font-semibold text-blue-400">0</div><div class="text-xs text-white/40 mt-1">总计练习(分)</div></div>
        <div class="rounded-xl border border-white/5 bg-[#0f1524] p-4 flex flex-col justify-between">
          <div class="text-[11px] text-white/40">近 7 日打卡记录</div>
          <div class="flex justify-between items-center text-xs text-center mt-2" id="calendarDays"></div>
        </div>
      </div>
    </div>

    <!-- 子词库 -->
    <div class="space-y-3">
      <h4 class="text-sm font-semibold text-white/50 tracking-wider">子词库学成状态</h4>
      <div id="dictSelectorGrid" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
    </div>
  </main>
</div>

<script>
// 词库大小元数据静态声明用于工作台展示
const DICT_METADATA = {
  life: { name: '生活用语30词', desc: 'Daily Survival', count: 30 },
  numbers: { name: '数字时间25词', desc: 'Numbers & Time', count: 25 },
  jakarta: { name: '雅加达本地25词', desc: 'Jakarta Lokal', count: 8 },
  slang: { name: '社交俚语20词', desc: 'Gaul & Slang', count: 4 }
};

let activeDictKey = localStorage.getItem('tw_dict') || 'life';
let progress = JSON.parse(localStorage.getItem('typewords_v3') || '{}');

function renderWorkspace() {
  const meta = DICT_METADATA[activeDictKey];
  document.getElementById('panelDictName').textContent = meta.name;
  
  let globalMastered = 0, globalWrong = 0;
  Object.keys(DICT_METADATA).forEach(k => {
    const p = progress[k] || {};
    Object.keys(p).forEach(w => {
      if(p[w].c >= 2) globalMastered++;
      if(p[w].w > 0) globalWrong++;
    });
  });

  let curMastered = 0;
  const curProg = progress[activeDictKey] || {};
  Object.keys(curProg).forEach(w => { if(curProg[w].c >= 2) curMastered++; });

  const pct = Math.round((curMastered / meta.count) * 100) || 0;
  document.getElementById('panelPctText').textContent = pct + '%';
  document.getElementById('panelMasteredCount').textContent = curMastered;
  document.getElementById('panelTotalCount').textContent = meta.count;
  document.getElementById('panelProgressBar').style.width = pct + '%';
  document.getElementById('cardMastered').textContent = globalMastered;
  document.getElementById('cardWrong').textContent = globalWrong;

  // 动态生成列表
  const grid = document.getElementById('dictSelectorGrid');
  grid.innerHTML = '';
  Object.keys(DICT_METADATA).forEach(k => {
    const m = DICT_METADATA[k];
    let mCount = 0;
    Object.keys(progress[k] || {}).forEach(w => { if((progress[k][w].c||0) >= 2) mCount++; });

    const btn = document.createElement('button');
    btn.className = `w-full text-left p-3.5 rounded-xl border transition tap flex items-center justify-between ${k === activeDictKey ? 'bg-white/[0.04] border-indigo-500/50' : 'bg-[#0f1524] border-white/5 hover:bg-white/[0.02]'}`;
    btn.innerHTML = `<div><div class="text-sm font-semibold text-white/90">${m.name}</div><div class="text-xs text-white/40 mt-0.5">${m.desc}</div></div><div class="text-xs font-mono px-2.5 py-1 rounded bg-white/5 text-white/60">已掌握 ${mCount} / ${m.count}</div>`;
    btn.onclick = () => {
      activeDictKey = k;
      localStorage.setItem('tw_dict', k);
      renderWorkspace();
    };
    grid.appendChild(btn);
  });
}

// 渲染打卡日历
const cal = document.getElementById('calendarDays');
const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
const curDay = new Date().getDay();
for(let i=0; i<7; i++){
  cal.innerHTML += `<div class="flex flex-col items-center gap-1"><span class="text-[10px] text-white/30">${weekDays[i]}</span><span class="w-6 h-6 rounded-full flex items-center justify-center text-[11px] ${i===curDay?'bg-blue-600 text-white font-bold':'text-white/50 bg-white/[0.02]'}">${7+i}</span></div>`;
}

document.getElementById('resetBtn').onclick = () => {
  if(confirm('重置所有进度？')) { localStorage.removeItem('typewords_v3'); progress={}; renderWorkspace(); }
};

renderWorkspace();
</script>
