<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>键盘输入训练 - TypeWords ID</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{background:#0a0f1d; color:#e5e7eb}
  .tap{transition:transform .08s ease} .tap:active{transform:scale(.97)}
</style>
</head>
<body class="min-h-screen flex flex-col justify-between p-6">

<div class="max-w-3xl mx-auto w-full space-y-4">
  <a href="dashboard.html" class="text-xs text-indigo-400 hover:underline">⬅ 返回单词工作台总览</a>
  
  <div class="relative overflow-hidden rounded-2xl border border-white/10 bg-[#0d1425] shadow-2xl p-6 md:p-8 space-y-6">
    <div class="flex items-center justify-between">
      <span id="typingModeTag" class="text-xs px-2.5 py-1 rounded bg-indigo-500/10 text-indigo-300">加载中...</span>
      <div class="text-xs text-white/40"><span id="idxNow">1</span>/<span id="idxTotal">30</span></div>
    </div>

    <div class="w-full h-[2px] bg-white/5 rounded-full overflow-hidden">
      <div id="progressBar" class="h-full w-0 bg-gradient-to-r from-violet-500 to-cyan-400 transition-all duration-300"></div>
    </div>

    <div class="text-center py-4">
      <div id="zh" class="text-4xl md:text-5xl font-bold">---</div>
      <div class="mt-4 text-[10px] tracking-widest text-white/30 uppercase">读音 · Cara Baca</div>
      <div id="ipa" class="mt-1 font-mono text-cyan-400">---</div>
    </div>

    <div id="mask" class="text-center text-2xl tracking-[0.3em] text-white/20 select-none font-mono">• • • •</div>
    <div id="speakIndicator" class="hidden text-center text-xs text-violet-400 animate-pulse">🔊 正在自动发音...</div>

    <div class="max-w-md mx-auto space-y-3">
      <input id="input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" class="w-full text-center text-2xl py-3.5 rounded-xl bg-[#060a14] border border-white/10 focus:border-violet-500 outline-none transition" placeholder="在此输入印尼语...">
      <div class="flex items-center justify-center gap-2 text-xs">
        <button id="speakBtn" class="tap px-3 py-1.5 rounded-lg bg-white/5 border border-white/10">发音</button>
        <button id="hintBtn" class="tap px-3 py-1.5 rounded-lg bg-white/5 border border-white/10">提示</button>
        <button id="skipBtn" class="tap px-3 py-1.5 rounded-lg bg-white/5 border border-white/10 text-white/50">跳过 ↵</button>
      </div>
    </div>

    <div class="pt-4 border-t border-white/5 text-center">
      <div id="example" class="text-sm text-white/70 italic">---</div>
    </div>
  </div>

  <!-- 发音配置 -->
  <div class="rounded-xl border border-white/5 bg-[#0f1524] p-4 flex flex-col md:flex-row items-center justify-between gap-4">
    <div class="flex gap-2">
      <button data-gender="female" class="voice-btn tap px-3 py-1 rounded bg-indigo-600 border border-white/10 text-xs">微软女声 (Gadis)</button>
      <button data-gender="male" class="voice-btn tap px-3 py-1 rounded bg-white/5 border border-white/10 text-xs">微软男声 (Ardi)</button>
    </div>
    <div id="voiceStatus" class="text-[11px] text-white/30">Microsoft Edge TTS</div>
  </div>
</div>

<script>
// 这里为了不注入外部冗杂库，使用原生的精简词库驱动拼写
const WORDS_DATA = {
  life: [
    {idn:'halo',zh:'你好',ipa:'ha-lo',ex:'Halo, apa kabar?'},
    {idn:'selamat pagi',zh:'早上好',ipa:'se-la-mat pa-gi',ex:'Selamat pagi!'},
    {idn:'terima kasih',zh:'谢谢',ipa:'te-ri-ma ka-sih',ex:'Terima kasih banyak.'},
    {idn:'sama-sama',zh:'不客气',ipa:'sa-ma sa-ma',ex:'Sama-sama.'},
    {idn:'maaf',zh:'对不起',ipa:'ma-af',ex:'Maaf, saya terlambat.'}
  ],
  numbers: [{idn:'satu',zh:'一',ipa:'sa-tu',ex:'Satu dua tiga.'},{idn:'dua',zh:'二',ipa:'du-a',ex:'Dua orang.'}],
  jakarta: [{idn:'gue',zh:'我 (雅加达)',ipa:'gue',ex:'Gue lapar nih.'}],
  slang: [{idn:'anjir',zh:'卧槽',ipa:'an-jir',ex:'Anjir, keren banget!'}]
};

let activeDict = localStorage.getItem('tw_dict') || 'life';
let list = WORDS_DATA[activeDict] || WORDS_DATA.life;
let queue = [...list].sort(()=>Math.random()-0.5);
let currentWord = null, seen = 0;
let progress = JSON.parse(localStorage.getItem('typewords_v3') || '{}');
let voiceGender = localStorage.getItem('tw_voice_gender') || 'female';
let currentAudio = null, speakToken = 0;

function setInputLocked(locked) {
  const input = document.getElementById('input');
  input.disabled = locked;
  input.placeholder = locked ? '正在自动美妙发音，请聆听…' : '在此输入印尼语...';
  document.getElementById('speakIndicator').classList.toggle('hidden', !locked);
}

async function msSpeak(text) {
  const token = ++speakToken;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  const edgeVoice = voiceGender === 'female' ? 'GadisNeural' : 'ArdiNeural';
  const ssml = `<speak version='1.0' xmlns='http://www.w3.org/2001/10/synthesis' xml:lang='id-ID'><voice name='Microsoft Server Speech Text to Speech Voice (id-ID, ${edgeVoice})'>${text}</voice></speak>`;
  try {
    const resp = await fetch('https://speech.platform.bing.com/consumer/speech/synthesize/readaloud/edge/v1?TrustedClientToken=6A5AA1D4EAFF4E9FB37E23D68491D6A4', {
      method: 'POST', headers: { 'Content-Type': 'application/ssml+xml', 'X-Microsoft-OutputFormat': 'audio-24khz-48kbitrate-mono-mp3' }, body: ssml
    });
    if (resp.ok && token === speakToken) {
      const blob = await resp.blob();
      return new Promise(resolve => {
        const audio = new Audio(URL.createObjectURL(blob)); currentAudio = audio;
        audio.onended = () => resolve(token === speakToken);
        audio.play().catch(() => resolve(false));
      });
    }
  } catch (e) {}
}

async function nextWord() {
  if(queue.length === 0) { queue = [...list].sort(()=>Math.random()-0.5); seen = 0; }
  currentWord = queue.shift(); seen++;

  document.getElementById('typingModeTag').textContent = activeDict.toUpperCase() + ' 词库';
  document.getElementById('zh').textContent = currentWord.zh;
  document.getElementById('ipa').textContent = currentWord.ipa;
  document.getElementById('mask').textContent = currentWord.idn.replace(/[^\s]/g,'•').split('').join(' ');
  document.getElementById('example').textContent = currentWord.ex;
  
  const input = document.getElementById('input');
  input.value = '';
  input.className = "w-full text-center text-2xl py-3.5 rounded-xl bg-[#060a14] border border-white/10 focus:border-violet-500 outline-none transition";
  
  document.getElementById('idxNow').textContent = seen;
  document.getElementById('idxTotal').textContent = list.length;
  document.getElementById('progressBar').style.width = (seen / list.length)*100 + '%';

  setInputLocked(true);
  await Promise.race([msSpeak(currentWord.idn), new Promise(r => setTimeout(r, 4000))]);
  setInputLocked(false);
  input.focus();
}

function checkAnswer() {
  const input = document.getElementById('input');
  const val = input.value.trim().toLowerCase();
  const target = currentWord.idn.toLowerCase();
  if(!val) return;

  if(!progress[activeDict]) progress[activeDict] = {};
  if(!progress[activeDict][currentWord.idn]) progress[activeDict][currentWord.idn] = {c:0,w:0};

  if(val === target) {
    progress[activeDict][currentWord.idn].c++;
    input.className = "w-full text-center text-2xl py-3.5 rounded-xl bg-[#060a14] border-2 border-emerald-500 text-emerald-400 outline-none";
    input.disabled = true;
    localStorage.setItem('typewords_v3', JSON.stringify(progress));
    setTimeout(() => { input.disabled = false; nextWord(); }, 600);
  } else {
    progress[activeDict][currentWord.idn].w++;
    input.className = "w-full text-center text-2xl py-3.5 rounded-xl bg-[#060a14] border-2 border-rose-500 text-rose-400 outline-none";
    input.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}], {duration:150});
    localStorage.setItem('typewords_v3', JSON.stringify(progress));
    setTimeout(() => { input.className = "w-full text-center text-2xl py-3.5 rounded-xl bg-[#060a14] border border-white/10 focus:border-violet-500 outline-none"; }, 700);
  }
}

document.getElementById('input').addEventListener('input', () => {
  if (input.value.trim().toLowerCase() === currentWord?.idn.toLowerCase()) checkAnswer();
});
document.getElementById('input').addEventListener('keydown', e => { if(e.key === 'Enter') checkAnswer(); });
document.getElementById('speakBtn').onclick = () => msSpeak(currentWord.idn);
document.getElementById('skipBtn').onclick = nextWord;
document.getElementById('hintBtn').onclick = () => {
  document.getElementById('input').value = currentWord.idn.slice(0, Math.ceil(currentWord.idn.length * 0.4));
  document.getElementById('input').focus();
};

document.querySelectorAll('.voice-btn').forEach(btn => {
  btn.onclick = () => {
    voiceGender = btn.dataset.gender;
    localStorage.setItem('tw_voice_gender', voiceGender);
    document.querySelectorAll('.voice-btn').forEach(b => b.classList.toggle('bg-indigo-600', b.dataset.gender === voiceGender));
    msSpeak(currentWord.idn);
  };
});

nextWord();
</script>
</body>
</html>
